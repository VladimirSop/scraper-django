<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Linella Store{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #2c3e50;
            padding: 15px;
            color: white;
        }

        header a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #27ae60;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<header>
    <a href="/">Главная</a>

    {% if user.is_authenticated %}
        <span>Привет, {{ user.username }}</span>
        <a href="{% url 'users:logout' %}">Выйти</a>
    {% else %}
        <a href="{% url 'users:login' %}">Вход</a>
        <a href="{% url 'users:registration' %}">Регистрация</a>
    {% endif %}
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
