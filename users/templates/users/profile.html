{% extends "users/base.html" %}

{% block title %}Профиль{% endblock %}

{% block content %}

<div class="card p-4 shadow-sm mx-auto" style="max-width: 500px;">
    <h3 class="text-center mb-3">Личный кабинет</h3>

    {% if user.image %}
        <img src="{{ user.image.url }}" class="rounded-circle mx-auto d-block mb-3" width="100">
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-primary w-100">Сохранить</button>
    </form>

    <a href="/" class="btn btn-link mt-3">← На главную</a>
</div>

{% endblock %}
