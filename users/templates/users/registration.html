{% extends "users/base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<h2>Регистрация</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Зарегистрироваться</button>
</form>

<p>
    Уже есть аккаунт?
    <a href="{% url 'users:login' %}">Войти</a>
</p>

{% if form.errors %}
    <div class="error">
        {{ form.errors }}
    </div>
{% endif %}

{% endblock %}
